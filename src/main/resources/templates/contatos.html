<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registros de Contato - CRM Hospital São Rafael</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>Registros de Contato</h1>

        <a href="/dashboard" class="btn btn-secondary">
            Voltar Dashboard
        </a>

    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <table class="table table-hover align-middle">

                <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Lead</th>
                    <th>Funcionário</th>
                    <th>Tipo</th>
                    <th>Resultado</th>
                    <th>Observação</th>
                    <th>Data/Hora</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="registro : ${registros}">

                    <td th:text="${registro.id}"></td>

                    <td>
                        <span class="badge bg-primary"
                              th:text="${registro.tipo}">
                        </span>
                    </td>

                    <td>
                        <span class="badge bg-success"
                              th:text="${registro.resultado}">
                        </span>
                    </td>

                    <td th:text="${registro.observacao}"></td>

                    <td th:text="${registro.dataHora}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

    <div class="card shadow-sm mt-4">

        <div class="card-body">

            <h4 class="mb-3">Rotas da API</h4>

            <ul class="list-group">

                <li class="list-group-item">
                    <strong>POST</strong> /api/contatos
                </li>

                <li class="list-group-item">
                    <strong>GET</strong> /api/contatos
                </li>

            </ul>

        </div>

    </div>

</div>

</body>
</html>
