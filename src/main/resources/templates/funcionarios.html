<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Funcionários - CRM Hospital São Rafael</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>Funcionários</h1>

        <a href="/dashboard" class="btn btn-secondary">
            Voltar Dashboard
        </a>

    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <table class="table table-hover align-middle">

                <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Setor</th>
                    <th>Ativo</th>
                    <th>Data Criação</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="funcionario : ${funcionarios}">

                    <td th:text="${funcionario.id}"></td>

                    <td th:text="${funcionario.nome}"></td>

                    <td th:text="${funcionario.email}"></td>

                    <td>
                        <span class="badge bg-primary"
                              th:text="${funcionario.setor}">
                        </span>
                    </td>

                    <td>
                        <span th:if="${funcionario.ativo}"
                              class="badge bg-success">
                            Ativo
                        </span>

                        <span th:unless="${funcionario.ativo}"
                              class="badge bg-danger">
                            Inativo
                        </span>
                    </td>

                    <td th:text="${funcionario.dataCriacao}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

    <div class="card shadow-sm mt-4">

        <div class="card-body">

            <h4 class="mb-3">Endpoints da API</h4>

            <ul class="list-group">

                <li class="list-group-item">
                    GET /api/funcionarios
                </li>

                <li class="list-group-item">
                    GET /api/funcionarios/{id}
                </li>

                <li class="list-group-item">
                    POST /api/funcionarios
                </li>

                <li class="list-group-item">
                    PATCH /api/funcionarios/{id}/desativar
                </li>

                <li class="list-group-item">
                    PATCH /api/funcionarios/{id}/ativar
                </li>

            </ul>

        </div>

    </div>

</div>

</body>
</html>
