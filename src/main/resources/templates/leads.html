<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Leads - CRM Hospital São Rafael</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Leads</h1>

        <a href="/dashboard" class="btn btn-secondary">
            Voltar Dashboard
        </a>
    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <table class="table table-hover align-middle">

                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Responsável</th>
                    <th>Procedimento</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="lead : ${leads}">

                    <td th:text="${lead.id}"></td>

                    <td th:text="${lead.nome}"></td>

                    <td th:text="${lead.telefone}"></td>

                    <td th:text="${lead.email}"></td>

                    <td>
                        <span class="badge bg-primary"
                              th:text="${lead.status}">
                        </span>
                    </td>

                    <td th:text="${lead.nomeResponsavel} ?: 'Sem responsável'"></td>

                    <td th:text="${lead.procedimentoInteresse}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

    <div class="card shadow-sm mt-4">

        <div class="card-body">

            <h4 class="mb-3">Endpoints da API</h4>

            <ul class="list-group">

                <li class="list-group-item">
                    GET /api/leads
                </li>

                <li class="list-group-item">
                    GET /api/leads/{id}
                </li>

                <li class="list-group-item">
                    POST /api/leads
                </li>

                <li class="list-group-item">
                    PATCH /api/leads/{id}/contato
                </li>

                <li class="list-group-item">
                    PATCH /api/leads/{id}/desativar
                </li>

            </ul>

        </div>

    </div>

</div>

</body>
</html>
